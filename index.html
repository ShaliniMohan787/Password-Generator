<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Password Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Secure Password Generator</h1>

<div class="password-box">
<input type="password" id="password" readonly>
<button id="toggle">👁</button>
<button id="copy">📋</button>
</div>

<div class="length-box">
<label>Password Length: <span id="lengthValue">12</span></label>
<input type="range" min="4" max="32" value="12" id="lengthSlider">
</div>

<div class="options">

<label><input type="checkbox" id="uppercase" checked> Uppercase</label>
<label><input type="checkbox" id="lowercase" checked> Lowercase</label>
<label><input type="checkbox" id="numbers" checked> Numbers</label>
<label><input type="checkbox" id="symbols" checked> Symbols</label>

</div>

<button id="generate">Generate Password</button>

<div class="strength">
Strength: <span id="strengthText">Medium</span>

<div class="strength-bar">
<div id="strengthFill"></div>
</div>
</div>

<div class="security-info">

<p id="entropy">Entropy: -</p>
<p id="crackTime">Crack Time: -</p>

</div>

<div class="extra-buttons">

<button id="download">Download Password</button>
<button id="darkMode">🌙 Dark Mode</button>

</div>

<div class="history">

<h3>Recent Passwords</h3>
<ul id="historyList"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
